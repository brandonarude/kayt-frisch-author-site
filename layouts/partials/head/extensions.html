{{/*
  Project head extension — loads Google Fonts (Gloock for display, Inter
  for body) and the project's custom stylesheet so overrides land after
  all theme CSS.
*/}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@300;400;500;600;700&display=swap"
      media="print" onload="this.media='all'">
<noscript>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@300;400;500;600;700&display=swap">
</noscript>

<link rel="stylesheet" href="{{ "css/custom.css" | relURL }}" media="all">
